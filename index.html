<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Security headers (meta fallback; real headers set via vercel.json) -->
  <meta http-equiv="X-Content-Type-Options" content="nosniff" />
  <meta name="referrer" content="strict-origin-when-cross-origin" />
  <meta http-equiv="Permissions-Policy" content="camera=(), microphone=(), geolocation=(), interest-cohort=()" />

  <!-- Primary SEO (defaults; per-route Helmet overrides these) -->
  <title>Kundlee — Modern Vedic Astrology Reports for Life & Love</title>
  <meta name="description"
    content="Personalized Vedic astrology reports written with clarity and warmth. Guidance for life path, career, and relationships — delivered on WhatsApp." />
  <meta name="keywords"
    content="vedic astrology reports, modern vedic astrology, jeevan sathee report, jeevan marg report, kundli matching, career kundali, life path astrology" />
  <meta name="author" content="Kundlee" />

  <!-- Robots -->
  <meta name="robots" content="index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1" />
  <meta name="googlebot" content="index, follow" />
  <meta name="language" content="English" />

  <!-- Geographic SEO -->
  <meta name="geo.region" content="IN" />
  <meta name="geo.country" content="India" />

  <!-- Open Graph (sitewide fallback for non-JS social scrapers) -->
  <meta property="og:title" content="Kundlee — Modern Vedic Astrology Reports for Life & Love" />
  <meta property="og:description"
    content="Ancient Vedic wisdom, modern clarity. Personalized reports for life path, career, and relationships — delivered on WhatsApp." />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://www.kundlee.in/" />
  <meta property="og:image" content="https://www.kundlee.in/og-image-kundlee.jpg" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />
  <meta property="og:site_name" content="Kundlee" />
  <meta property="og:locale" content="en_IN" />

  <!-- Twitter -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:site" content="@kundlee" />
  <meta name="twitter:creator" content="@kundlee" />
  <meta name="twitter:title" content="Kundlee — Modern Vedic Astrology Reports" />
  <meta name="twitter:description"
    content="Personalized Vedic astrology reports for relationships, career, and life path." />
  <meta name="twitter:image" content="https://www.kundlee.in/og-image-kundlee.jpg" />

  <!-- Preload Critical Resources -->
  <link rel="preload" href="/src/assets/fonts/LarkenDEMO-Bold.otf" as="font" type="font/otf" crossorigin />
  <link rel="preload" href="/src/assets/fonts/LarkenDEMO-Regular.otf" as="font" type="font/otf" crossorigin />

  <!-- DNS Prefetch -->
  <link rel="dns-prefetch" href="//fonts.googleapis.com" />

  <!-- Favicon and App Icons -->
  <link rel="icon" type="image/png" href="/favicon-32x32.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
  <link rel="manifest" href="/site.webmanifest" />

  <!-- Theme Color -->
  <meta name="theme-color" content="#D97706" />
  <meta name="msapplication-TileColor" content="#D97706" />

  <!-- Sitewide Organization + WebSite JSON-LD -->
  <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "Kundlee",
      "url": "https://www.kundlee.in",
      "logo": "https://www.kundlee.in/favicon-32x32.png",
      "description": "Kundlee crafts modern, clearly written Vedic astrology reports — ancient wisdom, contemporary clarity.",
      "sameAs": [
        "https://www.instagram.com/kundlee",
        "https://www.facebook.com/kundlee"
      ]
    }
    </script>
  <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "Kundlee",
      "url": "https://www.kundlee.in"
    }
    </script>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
