<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Security headers (meta fallback; real headers set via vercel.json) -->
    <meta http-equiv="X-Content-Type-Options" content="nosniff" />
    <meta name="referrer" content="strict-origin-when-cross-origin" />
    <meta http-equiv="Permissions-Policy" content="camera=(), microphone=(), geolocation=(), interest-cohort=()" />
    
    <!-- Primary SEO -->
    <title>Kundlee - Premium Vedic Astrology Reports | Relationship & Career Guidance</title>
    <meta name="description" content="Get deeply researched, personalized Vedic astrology reports for relationship compatibility and career guidance. Navigate life's most important decisions with confidence through traditional wisdom and modern clarity." />

    <meta name="author" content="Kundlee" />
    
    <!-- Enhanced SEO Meta Tags -->
    <meta name="robots" content="index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1" />
    <meta name="googlebot" content="index, follow" />
    <meta name="language" content="English" />
    <meta name="revisit-after" content="7 days" />
    <meta name="rating" content="general" />
    <meta name="distribution" content="global" />
    
    <!-- Geographic SEO -->
    <meta name="geo.region" content="IN" />
    <meta name="geo.country" content="India" />
    <meta name="geo.placename" content="Mumbai, India" />
    
    <!-- Open Graph Tags -->
    <meta property="og:title" content="Kundlee - Premium Vedic Astrology Reports for Life Guidance" />
    <meta property="og:description" content="Transform your life with meticulously researched, personalized Vedic astrology reports. Get clarity on relationships, career, and life path through authentic astrological wisdom." />

    <meta property="og:url" content="https://kundlee.com" />
    <meta property="og:image" content="/og-image-kundlee.jpg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:site_name" content="Kundlee" />
    <meta property="og:locale" content="en_IN" />

    <!-- Twitter Card Tags -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@kundlee" />
    <meta name="twitter:creator" content="@kundlee" />
    <meta name="twitter:title" content="Kundlee - Premium Vedic Astrology Reports" />
    <meta name="twitter:description" content="Get personalized Vedic astrology reports for relationship compatibility and career guidance. Navigate life's decisions with authentic astrological wisdom." />

    <link rel="canonical" href="https://kundlee.com" />
    
    <!-- Preload Critical Resources -->
    <link rel="preload" href="/src/assets/fonts/LarkenDEMO-Bold.otf" as="font" type="font/otf" crossorigin />
    <link rel="preload" href="/src/assets/fonts/LarkenDEMO-Regular.otf" as="font" type="font/otf" crossorigin />
    
    <!-- DNS Prefetch for External Resources -->
    <link rel="dns-prefetch" href="//fonts.googleapis.com" />
    <link rel="dns-prefetch" href="//www.google-analytics.com" />
    
    <!-- Favicon and App Icons -->
    <link rel="icon" type="image/png" href="/favicon-32x32.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="manifest" href="/site.webmanifest" />

    <meta name="theme-color" content="#D97706" />
    <meta name="msapplication-TileColor" content="#D97706" />
